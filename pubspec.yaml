name: ecomerce_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  carousel_slider: ^5.0.0
  google_fonts: ^6.2.1
  provider: ^6.1.2
  google_nav_bar: ^5.0.6
  flutter_native_splash: ^2.4.3
flutter_native_splash:
  color: "#ffffff"
  image: "assets/logo/logo_withoutBack.png"
  android: true
  ios: true
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:

    - assets/
    - assets/home/
    - assets/posters/
    - assets/icons/
    - assets/logo/
    - assets/logo/socialLogos/
